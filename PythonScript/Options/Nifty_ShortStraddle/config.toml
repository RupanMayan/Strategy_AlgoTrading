#    7B. Intraday VIX Spike Monitor
#    7C. Trailing Stop-Loss
#    7D. Dynamic SL Tightening
#    7E. Combined Premium Decay Exit
#    7F. Winner-Leg Early Booking
#    7G. Breakeven SL + Spot-Move Exit
#    7H. Re-Entry After Early Close
#    7H-B. Post-Partial Recovery Lock
#    7H-C. Momentum Filter (Re-Entry)
#    7H-D. Asymmetric Leg Booking
