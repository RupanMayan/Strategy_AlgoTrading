# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 11 — STATE & LOG FILES
#
#  state_file: JSON persisted atomically after every state mutation.
#    Use absolute path when running as a systemd service or crontab.
#    e.g. "/home/ubuntu/strategy/strategy_state.json"
#
#  trade_log_file: One JSON object per line — appended on every position close.
#    Enables post-session analysis without digging through logs.
#    Set to "" to disable trade logging.
#
#  quote_fail_alert_threshold: consecutive monitor ticks where ALL active legs
#    fail LTP fetch before a Telegram alert is sent (broker quotes unreachable).
#    At monitor_interval_s=15s, threshold=3 means alert fires after ~45s of blackout.
# ──────────────────────────────────────────────────────────────────────────────

