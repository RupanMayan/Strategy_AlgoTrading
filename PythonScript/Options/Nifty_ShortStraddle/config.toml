# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 0 — DIRECTORY LAYOUT
#
#  All output files are organised into subdirectories to keep the project root
#  clean.  Paths are relative to the strategy directory (where main.py lives).
#  Use absolute paths for systemd/crontab deployments.
#
#  logs_dir : strategy.log + rotated log files
#  data_dir : strategy_state.json, trades.jsonl, vix_history.csv
#
#  Directories are auto-created at startup if they don't exist.
# ──────────────────────────────────────────────────────────────────────────────

[directories]
logs_dir = "logs"    # Log files — strategy.log, rotated archives
data_dir = "data"    # Data files — state, trade log, VIX history


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 1 — OPENALGO CONNECTION
# ──────────────────────────────────────────────────────────────────────────────

[connection]
host    = "http://127.0.0.1:5000"   # OpenAlgo server URL
api_key = "4b0043f2ff0eb98694d1b9925b43bcc4254d1655f038a4f2b3d735c062d17fc5"    # Leave blank → loaded from env OPENALGO_APIKEY


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 2 — INSTRUMENT
# ──────────────────────────────────────────────────────────────────────────────

[instrument]
underlying     = "NIFTY"       # NIFTY | BANKNIFTY | FINNIFTY
exchange       = "NSE_INDEX"   # Always NSE_INDEX for index-based option orders
lot_size       = 65            # NIFTY=65  BANKNIFTY=35  FINNIFTY=40
number_of_lots = 1             # Lots per leg — start with 1 for paper trading
product        = "MIS"         # MIS = intraday auto sq-off  |  NRML = carry forward
strike_offset  = "ATM"         # ATM | OTM1..OTM5 | ITM1..ITM5


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 3 — TIMING  (IST 24-hour HH:MM)
#
#  use_dte_entry_map:
#    true  → entry time is taken from dte_entry_time_map below (per DTE)
#    false → fixed entry_time is used for all days
#
#  WHY DTE-AWARE ENTRY TIMES:
#    Opening IV is 15–25% inflated vs fair value for the first 10–15 min.
#    Entering at 09:17 captures max premium but also captures max opening
#    volatility — 40% of all SL hits occur within 15 min of entry.
#    Waiting for IV normalisation improves fill quality and reduces false SLs.
#
#    DTE0/DTE1 (Tue/Mon): enter at 09:30 — gap settled, still captures most
#      of the day's theta on the highest-premium days.
#    DTE2 (Fri): 09:35 — moderate theta, extra 5 min improves fill price.
#    DTE3 (Thu): 09:40 — lower premium, margin-spike risk on open; cleaner
#      entry outweighs the marginal extra premium from entering earlier.
#    DTE4 (Wed): 09:45 — thin premium anyway; entering early adds risk with
#      minimal reward.
# ──────────────────────────────────────────────────────────────────────────────

[timing]
entry_time         = "09:30"   # Fallback entry time when use_dte_entry_map = false
exit_time          = "15:15"   # Hard square-off — closes ALL remaining open legs
monitor_interval_s = 15        # Seconds between P&L / SL checks
use_dte_entry_map  = true      # true = use map below | false = use entry_time for all

[timing.dte_entry_time_map]  # DTE → entry time (used when use_dte_entry_map = true)
"0" = "09:30"   # DTE0 = Tuesday   (expiry day)    — gap settled, max theta day
"1" = "09:30"   # DTE1 = Monday    (1 day out)     — strong theta, same rationale
"2" = "09:35"   # DTE2 = Friday    (2 days out)    — moderate theta, cleaner fill
"3" = "09:40"   # DTE3 = Thursday  (3 days out)    — lower premium, avoid open spike
"4" = "09:45"   # DTE4 = Wednesday (4 days out)    — thin premium, no rush


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 4 — DTE FILTER  (Days To Expiry)
#
#  DTE = TRADING days from today to nearest weekly expiry.
#  Matches AlgoTest exactly — weekends are excluded.
#  NSE market holidays are handled by the OpenAlgo Python Strategy scheduler;
#  the script will not be started on a holiday, so no internal holiday check needed.
#  Source: AlgoTest DTE filter documentation.
#
#  DTE mapping for NIFTY (Tuesday expiry):
#    DTE0 = Tuesday   (expiry day)             — peak theta, max premium collapse
#    DTE1 = Monday    (1 trading day before)   — strong theta
#    DTE2 = Friday    (2 trading days before)  — moderate theta
#    DTE3 = Thursday  (3 trading days before)  — lower premium
#    DTE4 = Wednesday (4 trading days before)  — thin premium
#    DTE5 = Tuesday   (5 trading days before)  — prev week expiry day
#    DTE6 = Monday    (6 trading days before)  — prev week Monday
#
#  NOTE: DTE uses TRADING days only (Mon–Fri, excluding weekends).
#        Calendar days give WRONG numbers — Fri would be DTE4 in calendar mode
#        but is correctly DTE2 in trading-day mode (matching AlgoTest).
#
#  Common presets:
#    [0, 1]             → peak theta days only (Tue + Mon)
#    [0]                → expiry day only — most aggressive theta capture
#    [0, 1, 2]          → Tue + Mon + Fri
#    [0, 1, 2, 3, 4]    → full expiry week — all 5 trading days
#    [0, 1, 2, 3, 4, 5, 6] → all days — previous + current expiry week
# ──────────────────────────────────────────────────────────────────────────────

[dte_filter]
trade_dte = [0, 1, 2, 3, 4]   # Full expiry week (all 5 trading days)


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 5 — MONTH FILTER
#  1=Jan … 11=Nov … 12=Dec
#  November is a consistent loss month across all backtest years.
#  Common options:
#    [11]    → skip November only
#    [4, 11] → also skip April (weaker month)
#    []      → trade all months
# ──────────────────────────────────────────────────────────────────────────────

[month_filter]
skip_months = [11]   # Skip November


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 6 — VIX FILTER
#  VIX < 14 : premiums too thin  |  VIX > 28 : danger zone
#  Verified against AlgoTest backtest configuration.
# ──────────────────────────────────────────────────────────────────────────────

[vix_filter]
enabled = true
vix_min = 14.0   # Skip if VIX below this — premiums too thin
vix_max = 28.0   # Skip if VIX above this — danger zone


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 6A — IV RANK (IVR) / IV PERCENTILE (IVP) FILTER
#
#  WHY THIS FILTER EXISTS:
#    A short straddle only has genuine statistical edge when IMPLIED VOLATILITY
#    is historically expensive — because expensive IV mean-reverts downward,
#    adding an IV-crush profit component on top of theta decay.
#    Without this filter, entries on low-IVR days face an IV headwind: even
#    if NIFTY stays flat, rising IV makes your short positions more expensive.
#
#  IV RANK (IVR):
#    IVR = (Today_VIX − 52wk_Low_VIX) / (52wk_High_VIX − 52wk_Low_VIX) × 100
#    Answers: "Where is today's IV within the past 52-week HIGH/LOW range?"
#    IVR = 0  → VIX at 52-week low   |   IVR = 100 → VIX at 52-week high
#
#  IV PERCENTILE (IVP):
#    IVP = (Days in past 252 where VIX < Today_VIX) / 252 × 100
#    Answers: "What % of past 252 days had LOWER IV than today?"
#    IVP = 75 → IV is higher than it was on 75% of trading days this year
#
#  BALANCED THRESHOLDS (recommended for NIFTY weekly straddle):
#    ivr_min = 30 → skip if IV is in the bottom 30% of its 52-week range
#    ivp_min = 40 → skip if IV is below 40th percentile of daily occurrences
#    Expected: ~20–25% fewer trades, +5–8% win-rate improvement, −30% max-DD
#
#  DATA REQUIREMENT:
#    Requires vix_history.csv — a CSV of daily VIX closing values.
#    Format (with header):
#        date,vix_close
#        2024-04-01,14.82
#        2024-04-02,15.10
#        ...
#    BOOTSTRAP: Download NIFTY VIX historical data from nseindia.com
#      → Market Data → Volatility → Historical VIX → download CSV.
#      Rename to vix_history.csv, keep only "Date" and "Close" columns,
#      rename headers to "date,vix_close", save in the same directory as script.
#    AUTO-UPDATE: job_update_vix_history() appends today's VIX every day at
#      vix_update_time automatically — file is self-maintaining after bootstrap.
#
#  ivr_fail_open:
#    false (recommended) → if history file is missing/short, SKIP trade.
#      Rationale: unknown IV regime = unknown edge. Better to miss a trade than
#      enter blindly. This is conservative and production-safe.
#    true  → allow trade if data is unavailable (matches margin guard behaviour).
#      Use only in paper-trade / testing mode.
# ──────────────────────────────────────────────────────────────────────────────

[ivr_ivp_filter]
ivr_filter_enabled   = true
ivr_min              = 30.0    # Skip if IVR < 30  (IV in bottom 30% of 52wk range)
ivp_filter_enabled   = true
ivp_min              = 40.0    # Skip if IVP < 40% (IV below 40th percentile)
ivr_fail_open        = false   # false = skip trade if history unavailable (production-safe fail-closed)
vix_history_file     = "vix_history.csv"   # Path to daily VIX closing data file
vix_history_min_rows = 100     # Minimum rows needed for a meaningful IVR/IVP calculation
vix_update_time      = "15:30" # IST time to auto-append today's VIX to history file


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 6B — OPENING RANGE FILTER  (directional gap guard)
#
#  WHY THIS EXISTS:
#    A short straddle profits from IV crush and theta decay, not from direction.
#    On days where NIFTY gaps sharply at open (budget, RBI policy, global cues),
#    one leg is immediately deep ITM and the position starts underwater.
#    The IVR/VIX filters screen historical regime; this filter screens the
#    INTRADAY opening impulse — complementary, not redundant.
#
#    Data: ~35–40% of straddle losses on DTE0/DTE1 follow mornings where NIFTY
#    moved > 0.5% in the first 15 minutes. Skipping those days eliminates a
#    disproportionate share of drawdown with minimal win-rate sacrifice.
#
#  HOW IT WORKS:
#    1. job_orb_capture() fires at capture_time (default 09:17 IST).
#       It fetches the live NIFTY spot and stores it as state["orb_price"].
#       09:17 is 2 minutes after open — enough for the first quote stabilisation.
#    2. orb_filter_ok() is called inside job_entry() just before the trade.
#       It fetches NIFTY spot again and computes:
#         move_pct = |entry_spot − orb_price| / orb_price × 100
#       If move_pct > max_move_pct → trade is skipped for the day.
#
#  FAIL-OPEN BEHAVIOUR:
#    If ORB capture or the entry-time spot fetch fails, the filter is bypassed
#    (fail-open). Safe for production — a missing ORB check is advisory, unlike
#    a missing margin check which could blow the account.
#
#  max_move_pct guidance (NIFTY weekly straddle):
#    0.30% → aggressive — catches even moderate gaps (more skips, +win-rate)
#    0.50% → balanced   — catches meaningful directional opens (recommended)
#    0.75% → relaxed    — only catches large gaps; few skips
# ──────────────────────────────────────────────────────────────────────────────

[orb_filter]
enabled       = true
capture_time  = "09:17"   # Capture NIFTY reference price 2 min after open
max_move_pct  = 0.5       # Skip trade if NIFTY moved > 0.5% from ORB price


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7 — RISK MANAGEMENT
#
#  leg_sl_percent — applied to EACH LEG INDEPENDENTLY:
#    CE SL = CE_entry_price × (1 + leg_sl_percent/100)  → close CE only
#    PE SL = PE_entry_price × (1 + leg_sl_percent/100)  → close PE only
#    99.6% accuracy verified from AlgoTest CSV (2311 SL hits, median = 20.00%)
#
#  daily_profit_target_per_lot / daily_loss_limit_per_lot — per lot values:
#    Effective Rs. threshold = per_lot value × number_of_lots (auto-scaled in code)
#    combined = closed_leg_pnl + open_leg(s)_mtm
#    Trips → close ALL remaining open legs immediately
#    Example: per_lot target=5000, lots=2 → effective target = Rs.10,000
# ──────────────────────────────────────────────────────────────────────────────

[risk]
leg_sl_percent              = 30.0   # % of entry premium per leg  (0 = disabled)
                                     # Backtest-optimised: 30% (was 20%) — wider SL lets trades
                                     # breathe for theta capture. Avoids false SL hits especially
                                     # on DTE2+ where morning volatility spikes are common.
daily_profit_target_per_lot = 10000  # Rs. profit target PER LOT   (0 = disabled)
                                     # Backtest-optimised: 10000 (was 5000) — higher target captures
                                     # full theta. Rarely hit anyway (2/291 trades), so raising it
                                     # avoids capping big winning days.
daily_loss_limit_per_lot    = -6000  # Rs. loss limit PER LOT — NEGATIVE  (0 = disabled)
                                     # Backtest-optimised: -6000 (was -4000) — wider limit reduces
                                     # premature stop-outs. Most SL exits recover intraday.
net_pnl_guard_max_defer_min = 15     # Max minutes to defer SL via Net P&L Guard (0 = unlimited)
                                     # After this cap, per-leg SL fires regardless of net P&L.
                                     # Prevents slow bleed when closed_pnl masks open-leg loss.

# ── DTE-aware SL override ──
# With base SL now at 30%, DTE overrides are no longer needed — the wider base
# already handles DTE2+ volatility. Backtest confirmed 30% across all DTEs is
# optimal. Overrides removed (all DTEs use leg_sl_percent = 30%).
# Preserved as comments for reference:
#   Previously: "2" = 25.0, "3" = 28.0, "4" = 30.0 (when base was 20%)
[risk.dte_sl_override]
# No overrides — all DTEs use base leg_sl_percent (30%)


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7A — PRE-TRADE MARGIN GUARD
#
#  Before placing the straddle, the script:
#    1. Calls client.funds()  → fetches availablecash + collateral
#    2. Calls client.margin() → fetches basket margin for CE+PE SELL MIS
#       (includes SPAN straddle portfolio offset — cheaper than two naked shorts)
#    3. Checks: (availablecash + collateral) >= required_margin × margin_buffer
#
#  margin_buffer = 1.20 → requires 20% headroom above margin
#    Rationale: SPAN margins can spike intraday on VIX moves.
#    Also compensates for Dhan's sequential (not basket) margin calculation.
#
#  fail_open = true  → if margin API fails, allow trade (don't block)
#    Set to false to be conservative: skip trade if margin API is unreachable.
#
#  strike_rounding: NIFTY=50, BANKNIFTY=100, FINNIFTY=50
#    Used to build the symbol string for the margin pre-check call.
# ──────────────────────────────────────────────────────────────────────────────

[risk.margin_guard]
enabled         = true
margin_buffer   = 1.20   # 20% safety headroom over required margin
fail_open       = true   # true = allow trade if margin API fails
strike_rounding = 50     # NIFTY=50, BANKNIFTY=100, FINNIFTY=50


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7B — INTRADAY VIX SPIKE MONITOR
#
#  WHY THIS EXISTS:
#    The short straddle is short vega — a rising VIX directly increases the
#    value of both legs even if NIFTY price stays flat. When VIX spikes
#    mid-session (surprise macro event, global sell-off, circuit trigger),
#    being short vega is the most dangerous place to be.
#    This monitor catches mid-session IV expansion and exits BEFORE the
#    combined loss exceeds what the VIX filter would have blocked at entry.
#
#  HOW IT WORKS:
#    vix_at_entry is captured during the entry filter (stored in state).
#    Every check_interval_s seconds the monitor fetches live VIX.
#    If current_VIX > vix_at_entry × (1 + threshold_pct / 100):
#      → close_all() fires immediately with reason "VIX Spike Exit"
#      → Telegram alert sent
#
#  threshold_pct guidance (NIFTY-specific):
#    10% → very sensitive — catches even moderate IV expansion (more exits)
#    15% → balanced       — catches significant intraday spikes (recommended)
#    20% → relaxed        — only exits on severe events (fewer exits, more risk)
#
#  abs_floor: prevents false exits at low absolute VIX levels.
#    FIX-V (v5.5.0): relative-only threshold is misleading at low VIX —
#    e.g. 14→16.1 = 15% spike but VIX 16 is normal and NOT dangerous.
#    Exit fires only when BOTH conditions are true:
#      spike_pct  >= threshold_pct  (15% relative rise)
#      current_vix >= abs_floor     (18 absolute floor)
#    At VIX_MIN=14: spike fires at 16.1 → blocked by floor ✓
#    At VIX=20:     spike fires at 23.0 → allowed (genuinely dangerous) ✓
#
#  check_interval_s: throttle — runs at most once per interval regardless of
#    how often the monitor tick fires. 300s (5 min) avoids API overload.
#    Reduce to 180s (3 min) on high-volatility days if desired.
# ──────────────────────────────────────────────────────────────────────────────

[risk.vix_spike_monitor]
enabled          = true
threshold_pct    = 15.0   # % rise from entry VIX triggers exit
check_interval_s = 300    # Seconds between VIX spike checks (5 min)
abs_floor        = 18.0   # Minimum absolute VIX required to confirm a spike exit


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7C — TRAILING STOP-LOSS / PROFIT LOCK-IN
#
#  WHY THIS EXISTS:
#    The fixed leg_sl_percent creates a permanent ceiling on losses but the
#    floor on profits NEVER lifts. If a leg is sold at Rs.100 and decays to
#    Rs.30 (Rs.70/unit profit), the SL is still Rs.120. A sudden reversal from
#    Rs.30 to Rs.120 would erase the Rs.70 profit AND add a Rs.20 loss — a
#    Rs.90/unit swing. Trailing SL prevents this by locking in increasing
#    minimum profit as the option price decays.
#
#  HOW IT WORKS (per leg — independently):
#
#    Phase 1 — TRIGGER (one-time per leg per trade):
#      When LTP falls to trigger_pct% of entry price, trailing activates.
#      Example: entry Rs.100, trigger_pct=50 → triggers when LTP = Rs.50.
#      At activation: initial trailing SL = LTP × (1 + lock_pct/100).
#      Safety cap: initial trailing SL is capped at the fixed SL level to
#        prevent misconfigured lock_pct from setting a worse SL than fixed.
#
#    Phase 2 — TRAIL (every monitor tick once active):
#      new_trail_sl = LTP × (1 + lock_pct/100)
#      SL only MOVES DOWN — updates only when new value < current trailing SL.
#      This locks in more profit as LTP continues to fall.
#
#    Example walk-through (entry Rs.100, trigger=50%, lock=30%):
#      LTP Rs.50 → trail activates. SL = Rs.50 × 1.30 = Rs.65   (locks Rs.35/unit)
#      LTP Rs.35 → SL updated.      SL = Rs.35 × 1.30 = Rs.45.50 (locks Rs.54.50/unit)
#      LTP Rs.20 → SL updated.      SL = Rs.20 × 1.30 = Rs.26    (locks Rs.74/unit)
#      LTP Rs.10 → SL updated.      SL = Rs.10 × 1.30 = Rs.13    (locks Rs.87/unit)
#      LTP bounces from Rs.10 → Rs.13 → SL HIT → exit at Rs.13, profit = Rs.87/unit ✓
#
#  STATE PERSISTENCE:
#    trailing_active_ce/pe and trailing_sl_ce/pe are part of the JSON state.
#    On script restart mid-trade (crash/restart): the exact trailing state is
#    fully restored from disk — trailing resumes exactly where it left off.
#    No reset to the fixed SL on restart — this is the correct behaviour.
#
#  trigger_pct guidance (NIFTY weekly straddle):
#    40 → early trail  — activates when 60% profit captured (aggressive)
#    50 → balanced     — activates when 50% profit captured (recommended)
#    60 → conservative — activates when 40% profit captured (fewer activations)
#
#  lock_pct guidance:
#    20 → tight  — more exits on small bounces, locks more profit
#    30 → balanced — good buffer for normal intraday bounces (recommended)
#    40 → loose  — fewer exits, wider room, less profit locked per step
# ──────────────────────────────────────────────────────────────────────────────

[risk.trailing_sl]
enabled     = false  # Backtest-optimised: DISABLED (was true)
                     # Trailing SL rarely activates (3/224 trades in backtest) and when
                     # it does, it cuts winners short. With wider 30% base SL and
                     # breakeven SL protecting partial exits, trailing adds no value.
                     # Re-enable only after live validation shows consistent benefit.
trigger_pct = 50.0   # Activate when LTP falls to this % of entry price
lock_pct    = 15.0   # Trailing SL = current_LTP × (1 + lock_pct/100)


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7D — DYNAMIC SL TIGHTENING  (time-of-day graduated SL)
#
#  WHY THIS EXISTS:
#    The fixed 20% SL is calibrated for the morning session when full-day risk
#    justifies a wide stop. By afternoon, theta has already captured most of the
#    premium and holding a 20% SL exposes hard-earned profits to a late gamma
#    surprise. Tightening the SL progressively through the day locks in more
#    profit as the position matures.
#
#    Most effective on DTE0/DTE1 (expiry day and Monday) where intraday theta
#    acceleration is steepest and late-session reversals are most damaging.
#
#  HOW IT WORKS:
#    When enabled, _dynamic_sl_percent() replaces the flat leg_sl_percent in
#    the FIXED-SL calculation path of sl_level().
#    The trailing SL (when active) always takes precedence — this setting only
#    affects legs that have NOT yet triggered trailing.
#
#    schedule is a list of (time, sl_pct) entries evaluated in descending time
#    order. The FIRST entry whose time <= now() wins.
#    Before the earliest threshold, leg_sl_percent (default 30%) is used.
#
#  Schedule guidance (NIFTY intraday):
#    After 14:30 → 7%  : Last 45 min; premium largely decayed, protect gains
#    After 13:30 → 10% : Afternoon session; reduce exposure
#    After 12:00 → 15% : Mid-session; moderate tightening
#    Before 12:00 → leg_sl_percent (30%) : Morning; full width needed
# ──────────────────────────────────────────────────────────────────────────────

[risk.dynamic_sl]
enabled = false  # Backtest-optimised: DISABLED (was true)
                 # Time-of-day SL tightening hurts more than helps with the wider 30%
                 # base SL. The afternoon tightening (7-15%) creates false SL hits on
                 # normal intraday bounces, cutting profitable positions. With 30% SL
                 # and no trailing, the position naturally captures theta to hard exit.

# Must be in DESCENDING time order (latest time first). First match wins.
# Preserved for reference — re-enable with caution after live validation.
schedule = [
    { time = "14:30", sl_pct = 7.0  },   # After 2:30 PM → very tight (last 45 min, max theta harvested)
    { time = "13:30", sl_pct = 10.0 },   # After 1:30 PM → medium-tight
    { time = "12:00", sl_pct = 15.0 },   # After 12:00 PM → slightly tighter than morning
]


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7E — COMBINED PREMIUM DECAY EXIT
#
#  WHY THIS EXISTS:
#    When BOTH legs are still active and have collectively decayed by a large
#    percentage, continuing to hold exposes the position to afternoon gamma risk
#    for diminishing remaining theta. Locking in profits at a combined decay
#    target removes event risk in the final session hours.
#
#    Most useful on DTE2/DTE3 (Thu/Fri) where 60% combined decay often occurs
#    by 11:30–12:00 AM — well before the 15:15 hard exit. On DTE0/DTE1 (peak
#    theta days) the remaining premium is valuable enough to hold longer.
#
#  HOW IT WORKS:
#    combined_entry = CE_entry_price + PE_entry_price
#    combined_ltp   = CE_ltp + PE_ltp  (fetched fresh each monitor tick)
#    decay_pct      = (1 − combined_ltp / combined_entry) × 100
#    If decay_pct >= decay_target_pct → close_all() fires.
#
#  NOTE: Fires only when BOTH CE and PE legs are still active.
#        Single-leg survivors are managed by trailing SL or winner booking.
# ──────────────────────────────────────────────────────────────────────────────

[risk.combined_decay_exit]
enabled          = true
decay_target_pct = 60.0   # Default target — used when DTE has no override

# FIX-XXIII: DTE-aware decay targets. On peak theta days (DTE0/DTE1) premium
# decays faster — a lower target exits too early, leaving theta on the table.
# On DTE3/DTE4 premium is thinner — exiting at 50% is safer.
[risk.combined_decay_exit.dte_override]
"0" = 60.0   # DTE0 = Tuesday   (expiry day) — backtest-optimised: 60% (was 70%)
             # Phase 3 grid search found 60% exits slightly earlier on expiry day,
             # avoiding late gamma risk while still capturing most theta.
"1" = 65.0   # DTE1 = Monday    — strong theta, slightly lower target
"2" = 60.0   # DTE2 = Friday    — moderate theta, standard target
"3" = 50.0   # DTE3 = Thursday  — lower premium, exit earlier
"4" = 50.0   # DTE4 = Wednesday — thin premium, exit earlier


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7F — WINNER-LEG EARLY BOOKING
#
#  WHY THIS EXISTS:
#    After one leg hits SL (e.g. CE closes on upside move), the surviving PE is
#    often deeply profitable — having decayed to 20–30% of its entry price.
#    Holding this leg to 15:15 exposes a large unrealised gain to gamma risk:
#    a market reversal can push PE from Rs.15 back to Rs.60+ rapidly.
#    Booking early at high decay locks the profit and removes residual exposure.
#
#  HOW IT WORKS:
#    Every monitor tick, when exactly ONE leg is active, a fresh LTP is fetched
#    for the surviving leg. If its LTP is <= decay_threshold_pct% of its entry
#    price, close_one_leg() fires immediately.
#    Example: PE entry Rs.100, threshold 30% → book when LTP <= Rs.30 (70%+ decay)
#
#  decay_threshold_pct guidance:
#    20% → aggressive   — books when 80%+ of premium captured (higher profit lock,
#           misses final 20% decay if market stays quiet)
#    30% → balanced     — books at 70%+ decay; protects against common reversals
#           (recommended)
#    40% → conservative — books at 60%+ decay; allows more premium capture but
#           exposes larger unrealised gain to reversal risk
#
#  SAFETY: Winner booking uses a FRESH LTP fetch — never acts on stale LTP from
#    the per-leg SL check. If the LTP fetch fails, booking is skipped and
#    normal monitoring continues safely.
# ──────────────────────────────────────────────────────────────────────────────

[risk.winner_leg_booking]
enabled             = true
decay_threshold_pct = 30.0   # Book surviving leg when LTP <= 30% of entry price


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7G — BREAKEVEN SL AFTER PARTIAL EXIT
#
#  WHY THIS EXISTS:
#    When one leg hits its SL (e.g. CE closes at Rs.120 vs entry Rs.100, a
#    Rs.20/unit loss), the surviving PE is still open at, say, Rs.50. The
#    default fixed PE SL of Rs.120 (20% above PE entry Rs.100) remains — so
#    the position could still lose Rs.20/unit on PE as well, creating a
#    combined loss of Rs.40/unit × qty.
#    Breakeven SL protection prevents this: the surviving leg's SL is tightened
#    to the exact price where the total position (both legs combined) breaks even.
#
#  HOW IT WORKS:
#    Immediately after a partial exit (close_one_leg()):
#      closed_pnl = realised P&L from the closed leg (negative if SL hit)
#      be_sl = other_entry_px + closed_pnl / qty()
#
#    Example: CE entry Rs.100, CE closed at Rs.120 → closed_pnl = -Rs.1300 (65 qty)
#      PE entry Rs.100 → be_sl = 100 + (-1300/65) = 100 - 20 = Rs.80
#      PE SL now Rs.80 instead of Rs.120 — max additional loss = Rs.0 net.
#
#    Only activates when closed_pnl < 0 (net loss so far):
#      If the first leg closed profitably (winner booking → closed_pnl > 0),
#      breakeven is irrelevant — the position is already net positive.
#
#    FIX-XXIV: Context-aware activation — skips when survivor is WINNING.
#      After partial exit at loss, if surviving leg LTP < entry (profitable
#      for short), breakeven SL is SKIPPED. Trailing SL / fixed SL / winner
#      booking manage the profitable survivor.  Breakeven only arms when the
#      survivor is LOSING (LTP >= entry) — where it's genuinely needed.
#
#  Priority in sl_level():
#    1. Trailing SL (if active)              — always highest priority
#    2. Breakeven SL (if active AND tighter) — protects combined position
#    3. Fixed/dynamic SL                     — default
#
#  STATE PERSISTENCE:
#    breakeven_active_ce/pe and breakeven_sl_ce/pe are part of the JSON state.
#    On restart mid-trade: breakeven resumes exactly where it left off.
# ──────────────────────────────────────────────────────────────────────────────

[risk.breakeven_sl]
enabled          = true    # Tighten surviving leg SL to combined breakeven after partial exit
grace_period_min = 5       # Minutes to wait after partial close before arming breakeven SL.
                           # Prevents instant trigger — gives the surviving leg time to
                           # decay further and offset the closed leg's loss.
                           # 0 = no grace (original behaviour — fires immediately)
buffer_pct       = 5.0     # % buffer ABOVE the mathematical breakeven price.
                           # Backtest-optimised: 5% (was 10%) — tighter buffer locks
                           # breakeven more precisely. At 10%, breakeven SL fires too
                           # late and lets the survivor overshoot into loss territory.
                           # be_sl = breakeven_price × (1 + buffer_pct/100)
                           # 0 = no buffer (exact breakeven — aggressive)


# ──────────────────────────────────────────────────────────────────────────────
#  SPOT-MOVE EXIT  (part of Section 7G)
#
#  WHY THIS EXISTS:
#    Tracks NIFTY spot at entry time (state["underlying_ltp"]). Each monitor
#    tick (throttled), if NIFTY has moved beyond the straddle's theoretical
#    breakeven from entry spot, close_all() fires — the position has directional
#    risk beyond what the SL design accounts for.
#
#  HOW IT WORKS:
#    combined_premium = CE_entry_price + PE_entry_price  (per unit)
#    move_threshold   = combined_premium × spot_multiplier
#    if |current_NIFTY − spot_at_entry| >= move_threshold → close_all()
#
#  spot_multiplier guidance:
#    0.8 → exit slightly BEFORE theoretical breakeven (conservative — fewer
#           losses but may exit some recoverable situations)
#    1.0 → exit exactly AT theoretical breakeven (balanced, recommended)
#    1.2 → exit slightly AFTER — allows some breathing room past breakeven
#           (if individual SLs not yet hit; closer to daily loss limit role)
#
#  check_interval_s: throttle frequency. 60s means one NIFTY LTP fetch per
#    minute — negligible API load while catching intraday trends.
# ──────────────────────────────────────────────────────────────────────────────

[risk.spot_move_exit]
enabled          = false  # Backtest-optimised: DISABLED (was true)
                          # Spot-move exit was responsible for 26% of exits in production-match
                          # backtest — most were premature. With wider 30% SL and per-leg
                          # independence, positions naturally recover from directional moves.
                          # Disabling improved P&L by ~₹40K in backtest.
spot_multiplier  = 1.0   # Exit when NIFTY moves >= 1.0× combined premium from entry spot
check_interval_s = 60    # Throttle: fetch NIFTY spot at most once per 60s


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7H — RE-ENTRY AFTER EARLY CLOSE
#
#  WHY THIS EXISTS:
#    When a position closes early with a small loss (e.g. Rs.-517 at 09:46),
#    the strategy sits idle for the rest of the day. If the early close was
#    caused by transient morning volatility (common on DTE2+), re-entering
#    after conditions stabilise can recover the loss and capture the day's
#    remaining theta.
#
#  HOW IT WORKS:
#    After a full close, the strategy records the close time and P&L.
#    On subsequent entry job firings (DTE-map times), if:
#      1. cooldown_min minutes have passed since the last close
#      2. the previous trade's loss was <= max_loss_per_lot × number_of_lots
#      3. all normal entry filters still pass (VIX, IVR/IVP, ORB, margin)
#      4. max_reentries_per_day has not been reached
#    then a new entry is allowed.
#
#  SAFETY:
#    Re-entry uses a FRESH set of entry filters — VIX, ORB, margin are all
#    re-checked. If VIX spiked since the first trade, the VIX filter blocks.
#    max_reentries_per_day prevents runaway re-entry loops.
# ──────────────────────────────────────────────────────────────────────────────

[risk.reentry]
enabled                = true
cooldown_min           = 45     # Backtest-optimised: 45 min (was 30)
                                # 45-min cooldown lets market settle after adverse move.
                                # 30-min re-enters into still-trending market (worse results).
max_loss_per_lot       = 2000   # Per-lot Rs. threshold — effective = per_lot × number_of_lots
                                # Backtest-optimised: 2000 (unchanged) — blocks re-entry after
                                # large SL losses where market has moved significantly.
max_reentries_per_day  = 2      # Backtest-optimised: 2 (was 1) — second re-entry captures
                                # additional recovery after SL hits. Added +₹36K in backtest.
                                # Combined with 45-min cooldown, ensures re-entries are selective.


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7H-B — POST-PARTIAL RECOVERY LOCK  (FIX-XXV)
#
#  WHY THIS EXISTS:
#    After partial exit at a loss (one leg SL hit), FIX-XXIV lets the winning
#    survivor continue running. As it decays further, the combined P&L
#    (negative closed_pnl + growing winner MTM) crosses from negative to
#    positive — the position has RECOVERED from the SL loss. But without
#    protection, a sudden reversal can erase this hard-won recovery.
#
#  HOW IT WORKS:
#    1. After partial exit (closed_pnl < 0, one leg active), monitor tracks
#       combined_pnl = closed_pnl + open_mtm each tick.
#    2. When combined_pnl first crosses positive → "recovery achieved"
#    3. Track recovery_peak_pnl (highest combined_pnl after recovery)
#    4. If combined_pnl retraces trail_pct% from peak → close survivor
#       to lock the remaining recovery profit.
#    5. If combined_pnl drops back below zero → close immediately (recovery lost)
#
#  min_recovery_rs_per_lot: prevents premature trailing on tiny recoveries.
#    Recovery must reach this Rs. amount (per lot) before trailing activates.
#    500/lot = Rs.500 per lot minimum recovery before trail kicks in.
#
#  trail_pct: how much retracement from peak triggers exit.
#    50% → if peak recovery was Rs.2000, exit when it drops to Rs.1000
#    30% → tighter — exit at Rs.1400 (locks more profit, more exits)
#    70% → looser — exit at Rs.600 (fewer exits, more risk)
# ──────────────────────────────────────────────────────────────────────────────

[risk.recovery_lock]
enabled                = false   # Backtest-optimised: DISABLED (was true)
                                 # Recovery lock was the #1 exit reason (42% of trades) in
                                 # production-match backtest, cutting profits short. After
                                 # partial exit, the surviving winner naturally decays via
                                 # theta — recovery lock exits before this completes.
                                 # Winner-leg booking (Section 7F) handles deep decay exits.
min_recovery_rs_per_lot = 500    # Min recovery per lot before trailing starts
trail_pct              = 50.0    # Exit if recovery retraces 50% from peak


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7H-C — MOMENTUM FILTER  (FIX-XXVI)
#
#  WHY THIS EXISTS:
#    A short straddle profits from range-bound markets. After an early exit
#    (one-sided move), re-entering a fresh straddle into the SAME trend is
#    dangerous — the new losing leg starts under pressure immediately.
#    This filter blocks entry when NIFTY has drifted significantly from the
#    session open, indicating a trending (not range-bound) market.
#
#  HOW IT WORKS:
#    At entry time, fetches current NIFTY spot and compares to the ORB
#    reference price (captured at 09:17 IST). If the absolute % drift from
#    ORB reference exceeds max_drift_pct, entry is blocked.
#
#    drift_pct = |current_spot - orb_reference| / orb_reference × 100
#    If drift_pct > max_drift_pct → skip entry
#
#  max_drift_pct guidance:
#    0.3% → conservative — blocks when NIFTY has moved ~70 points
#    0.5% → balanced     — blocks when NIFTY has moved ~115 points (recommended)
#    0.8% → relaxed      — allows wider drift before blocking
#
#  NOTE: Only applies to RE-ENTRIES (not first trade of day). The first trade
#    relies on ORB filter alone. Re-entries need additional trend awareness
#    because the market has already shown directional bias.
# ──────────────────────────────────────────────────────────────────────────────

[filters.momentum]
enabled       = true
max_drift_pct = 0.5   # Block re-entry when NIFTY has drifted > 0.5% from ORB reference


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7H-D — ASYMMETRIC LEG BOOKING  (FIX-XXVII)
#
#  WHY THIS EXISTS:
#    When both legs are active but one has decayed significantly while the
#    other hasn't, the position is effectively naked on the non-decayed side.
#    Example: CE at 40% of entry (deep profit), PE at 90% of entry (barely
#    moved) — the position is basically a naked PE short. Gamma risk is
#    concentrated on the PE side. Booking the deeply decayed CE locks
#    profit and reduces the gamma exposure to a single-leg position.
#
#  HOW IT WORKS:
#    Every monitor tick, when BOTH legs are active:
#      winner_pct = winner_ltp / winner_entry × 100
#      loser_pct  = loser_ltp / loser_entry × 100
#    If winner_pct <= winner_decay_pct AND loser_pct >= loser_intact_pct:
#      → Book the deeply decayed winner via close_one_leg()
#      → Surviving loser continues with normal SL management
#
#  winner_decay_pct guidance:
#    30% → aggressive — book when 70% profit captured (earlier exit)
#    40% → balanced   — book when 60% profit captured (recommended)
#    50% → conservative — book when 50% profit captured (more room)
#
#  loser_intact_pct guidance:
#    70% → trigger on moderate asymmetry
#    80% → balanced — only when loser barely moved (recommended)
#    90% → strict — only extreme asymmetry triggers booking
#
#  NOTE: This is different from combined decay exit (which requires BOTH
#    legs to have decayed). Asymmetric booking fires when legs have
#    DIVERGED — one deep profit, one barely moved.
# ──────────────────────────────────────────────────────────────────────────────

[risk.asymmetric_booking]
enabled          = true
winner_decay_pct = 40.0   # Book winner when LTP <= 40% of entry (60%+ profit)
loser_intact_pct = 80.0   # Only if other leg LTP >= 80% of entry (barely moved)


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 7H-E — COMBINED PROFIT TRAILING  (FIX-XXVIII)
#
#  WHY THIS EXISTS:
#    When BOTH legs are actively decaying and the combined position is nicely
#    profitable, per-leg SLs protect individual legs but the COMBINED profit
#    has no floor. A sudden spike on one side can erase combined gains before
#    the combined decay exit target is reached.
#
#  HOW IT WORKS:
#    When BOTH legs are active:
#      combined_entry   = CE_entry + PE_entry
#      combined_current = CE_ltp + PE_ltp
#      combined_decay   = (1 - combined_current / combined_entry) × 100
#
#    Phase 1 — ACTIVATE:
#      When combined_decay first reaches activate_pct → record peak_decay
#
#    Phase 2 — TRAIL:
#      Track peak combined_decay. If combined_decay retraces below
#      (peak_decay - trail_pct) → close both legs.
#      Combined decay only moves AWAY from peak by trail_pct before exit.
#
#  activate_pct guidance:
#    25% → early activation — more protection, more premature exits
#    30% → balanced (recommended)
#    40% → late activation — less protection, fewer exits
#
#  trail_pct guidance:
#    30% → tight — exit if decay drops 30 points from peak (e.g. 50→20)
#    40% → balanced (recommended)
#    50% → loose — allows wider retracement before exit
#
#  NOTE: This does NOT replace the combined decay exit (Section 7E).
#    Combined decay exit is a TARGET (exit WHEN decayed enough).
#    Combined profit trail is a FLOOR (exit if LOSING decay progress).
#    Both can coexist — target fires first if reached; trail catches reversal.
# ──────────────────────────────────────────────────────────────────────────────

[risk.combined_profit_trail]
enabled      = true
activate_pct = 30.0   # Start trailing after combined decay reaches 30%
trail_pct    = 40.0   # Exit if combined decay retraces 40 points from peak


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 8 — EXPIRY
#  Format : DDMMMYY uppercase  e.g. "25MAR26"
#  auto_expiry = true → resolves the nearest Tuesday automatically every day.
#  manual_expiry is used only when auto_expiry = false (must be a Tuesday).
# ──────────────────────────────────────────────────────────────────────────────

[expiry]
auto_expiry   = true          # true = auto nearest Tuesday (NIFTY weekly expiry day)
manual_expiry = "25MAR26"     # Used only when auto_expiry = false  (must be a Tuesday)


