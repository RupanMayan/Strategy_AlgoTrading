trade_log_file             = "trades.jsonl"
quote_fail_alert_threshold = 3   # Ticks before quote-fail Telegram alert fires


# ──────────────────────────────────────────────────────────────────────────────
#  SECTION 12 — LOGGER
#
#  WHY THIS EXISTS:
#    The current script uses plog() which prints directly to stdout with no
#    level filtering, no file output, and no rotation. In production (systemd
#    service, crontab, VPS), stdout is either lost or fills disk unbounded.
#    A proper logger adds:
#      • Level filtering  — suppress DEBUG noise in production
#      • File output      — persist logs across terminal sessions
#      • Daily rotation   — one log file per trading day, auto-cleanup
#      • Size guard       — prevents runaway log files from filling disk
#
#  log_level:
#    Controls the minimum severity that is printed/written.
#    Levels in order of severity (lowest → highest):
#      DEBUG    → every monitor tick detail, SL calculations, LTP fetches
#                 Use only for troubleshooting — very verbose (thousands of lines/day)
#      INFO     → normal operation: entry, exit, filter decisions, reconcile
#                 Recommended for production — captures all meaningful events
#      WARNING  → non-fatal issues: state save failed, API retried, fallback used
#      ERROR    → failures that affect trade execution: order rejected, LTP missing
#      CRITICAL → system-level failures: scheduler crash, unrecoverable error
#
#  log_to_console:
#    true  → logger also prints to stdout (matches current plog() behaviour)
#             Useful during development or when running interactively
#    false → silent console; only writes to file (recommended for systemd/crontab)
#
#  log_to_file:
#    true  → logger writes to log_file in addition to (or instead of) console
#    false → console only (current behaviour — no change needed for dev/testing)
#
#  log_file:
#    Path to the log file. Can be relative (same dir as script) or absolute.
#    Use absolute path for systemd service or crontab.
#    e.g. "/home/ubuntu/strategy/strategy.log"
#    When log_rotation = "daily", the logger auto-appends YYYY-MM-DD suffix
#    to rolled-over files: strategy.log.2026-03-20
#
#  log_rotation:
#    "daily"  → rotate at midnight; one file per trading day (recommended)
#               Rolled files: strategy.log.2026-03-19, strategy.log.2026-03-18, …
#               Pairs well with backup_count = 30 to keep 1 month of history.
#    "size"   → rotate when file exceeds log_max_bytes
#               Rolled files: strategy.log.1, strategy.log.2, …
#               Useful when the script runs continuously without daily restart.
#    "none"   → no rotation; single file grows indefinitely (not recommended
#               for production — only for short paper-trade sessions)
#
#  log_max_mb:
#    Maximum file size in MB before rotation when log_rotation = "size".
#    Ignored when log_rotation = "daily" or "none".
#    10 MB — a full trading day at INFO level is ~1–2 MB.
#    At DEBUG level, allow 50–100 MB.
#
#  log_backup_count:
#    Number of rotated log files to keep before the oldest is deleted.
#    log_rotation = "daily" : backup_count = 30 keeps 30 days of history
#    log_rotation = "size"  : backup_count = 5  keeps 5 rolled size-files
#    Older files are deleted automatically by the rotating handler.
#
#  log_format:
#    Python logging format string. Tokens:
#      %(asctime)s   → timestamp (configured to IST via logging.Formatter)
#      %(levelname)s → DEBUG / INFO / WARNING / ERROR / CRITICAL
#      %(message)s   → the log message
#    Default mirrors the existing plog() output style exactly so existing
#    log parsers / grep patterns continue to work without changes.
# ──────────────────────────────────────────────────────────────────────────────

[logging]
log_level       = "INFO"          # DEBUG | INFO | WARNING | ERROR | CRITICAL
log_to_console  = true            # true = also print to stdout (current plog behaviour)
log_to_file     = true            # true = write logs to log_file
log_file        = "strategy.log"  # Log file path — use absolute path for systemd/crontab
log_rotation    = "daily"         # "daily" | "size" | "none"
log_max_mb      = 10              # Max file size in MB — used only when log_rotation = "size"
log_backup_count = 30             # Files to keep: 30 days (daily) or 5 rolled files (size)
log_format      = "%(asctime)s [%(levelname)-8s] %(message)s"  # Mirrors existing plog() style
